name: CI

# Deploys are handled by Vercel's GitHub integration (main → production,
# staging → staging.collective.email via the branch domain). Vercel's build
# re-runs typecheck + tests (vercel.json buildCommand), so a red suite cannot
# deploy. This workflow is the fast PR/push signal plus a post-deploy health
# verification.

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  verify-health:
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')
    runs-on: ubuntu-latest
    steps:
      - name: Wait for the Vercel deploy, then verify the app is on the real database
        run: |
          host=$([ "${{ github.ref }}" = "refs/heads/main" ] && echo collective.email || echo staging.collective.email)
          echo "verifying https://$host/health"
          for i in $(seq 1 30); do
            out=$(curl -sf "https://$host/health" || true)
            echo "$out"
            echo "$out" | grep -q '"db":"remote"' && exit 0
            sleep 10
          done
          echo "deployed app is NOT on the remote database" && exit 1
